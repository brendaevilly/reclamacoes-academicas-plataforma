<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Universidade</title>
    <link rel="stylesheet" href="../styles/cadastro-universidade.css">
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body>
    <main class="form-container">
        <form id="form-universidade" class="form-flutuante">
            <h2>Cadastrar Nova Universidade</h2>

            <!-- Nome -->
            <div class="form-grupo">
                <label for="nome">Nome Completo da Universidade</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Universidade Federal do Piauí" required>
            </div>

            <!-- Sigla -->
            <div class="form-grupo">
                <label for="sigla">Sigla</label>
                <input type="text" id="sigla" name="sigla" placeholder="Ex: UFPI">
            </div>

            <!-- Campus -->
            <div class="form-grupo">
                <label for="campus">Campus</label>
                <input type="text" id="campus" name="campus" placeholder="Ex: Teresina">
            </div>

            <!-- E-mail -->
            <div class="form-grupo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Ex: contato@ufpi.edu.br" required>
            </div>

            <!-- Senha -->
            <div class="form-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite uma senha" required>
            </div>

            <!-- CNPJ -->
            <div class="form-grupo">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="Ex: 12.345.678/0001-90">
            </div>

            <!-- Descrição -->
            <div class="form-grupo">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" placeholder="Breve descrição da universidade"></textarea>
            </div>

            <button type="submit">Cadastrar Universidade</button>
        </form>
    </main>

    <script src="../scripts/cadastro-universidade.js"></script>
</body>

</html>
